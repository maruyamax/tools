<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL CANVAS CALC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --accent1: #00ff9f;
    --accent2: #ff006e;
    --accent3: #00b4ff;
    --accent4: #ffcc00;
    --text: #e0e0f0;
    --dim: #555570;
    --grid: #1a1a28;
    --pixel: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Pixel grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,159,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,159,0.03) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  .title-block {
    display: inline-block;
    position: relative;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: var(--accent1);
    text-shadow:
      3px 3px 0 #006640,
      6px 6px 0 #003320,
      0 0 30px rgba(0,255,159,0.5);
    letter-spacing: 2px;
    line-height: 1.6;
    image-rendering: pixelated;
  }

  .subtitle {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--accent3);
    margin-top: 8px;
    letter-spacing: 4px;
    text-shadow: 0 0 12px rgba(0,180,255,0.6);
  }

  .blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ===== PIXEL BORDER MIXIN ===== */
  .px-box {
    background: var(--panel);
    border: 4px solid var(--border);
    image-rendering: pixelated;
    position: relative;
  }
  .px-box::before {
    content: '';
    position: absolute;
    inset: -8px;
    border: 4px solid transparent;
    pointer-events: none;
  }

  /* ===== LAYOUT ===== */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  @media (max-width: 640px) {
    .controls-grid { grid-template-columns: 1fr; }
  }

  .section-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--accent4);
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-shadow: 2px 2px 0 #664400;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '▶';
    color: var(--accent2);
    font-size: 10px;
  }

  /* ===== RATIO PRESETS ===== */
  .presets-panel {
    padding: 20px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .preset-btn {
    background: var(--grid);
    border: 3px solid var(--dim);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 10px 4px;
    cursor: pointer;
    transition: none;
    text-align: center;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }

  .preset-btn:hover {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(0,180,255,0.08);
    box-shadow: inset 0 0 12px rgba(0,180,255,0.15);
  }

  .preset-btn.active {
    border-color: var(--accent1);
    color: var(--accent1);
    background: rgba(0,255,159,0.08);
    box-shadow: 3px 3px 0 #006640, inset 0 0 16px rgba(0,255,159,0.15);
    transform: translate(-1px, -1px);
  }

  .preset-btn .ratio-display {
    font-size: 22px;
    display: block;
  }

  .preset-btn .ratio-type {
    font-size: 13px;
    color: var(--dim);
    display: block;
    margin-top: 2px;
  }
  .preset-btn.active .ratio-type { color: var(--accent1); opacity: 0.7; }

  /* ===== CUSTOM RATIO ===== */
  .custom-panel {
    padding: 20px;
  }

  .custom-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .px-input {
    background: var(--grid);
    border: 3px solid var(--dim);
    color: var(--accent1);
    font-family: 'VT323', monospace;
    font-size: 24px;
    padding: 8px 12px;
    width: 70px;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
  }
  .px-input::-webkit-inner-spin-button,
  .px-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .px-input:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 0 2px rgba(0,180,255,0.2);
  }

  .colon-sep {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--accent4);
  }

  .apply-btn {
    background: var(--accent2);
    border: 3px solid #ff004a;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 10px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 3px 3px 0 #7a0030;
    transition: none;
    margin-left: 8px;
  }

  .apply-btn:hover {
    background: #ff3388;
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #7a0030;
  }

  .apply-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #7a0030;
  }

  /* ===== BASE SIDE SELECTOR ===== */
  .base-panel {
    padding: 20px;
    grid-column: 1 / -1;
  }

  .toggle-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .toggle-btn {
    background: var(--grid);
    border: 3px solid var(--dim);
    color: var(--dim);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 8px 20px;
    cursor: pointer;
    transition: none;
    letter-spacing: 2px;
  }

  .toggle-btn.active {
    border-color: var(--accent4);
    color: var(--accent4);
    background: rgba(255,204,0,0.08);
    box-shadow: 3px 3px 0 #664400;
    transform: translate(-1px, -1px);
  }

  .toggle-desc {
    font-size: 16px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ===== RESULTS ===== */
  .results-section {
    margin-top: 8px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .current-ratio-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(255,0,110,0.1);
    border: 2px solid var(--accent2);
    padding: 6px 14px;
    letter-spacing: 1px;
    box-shadow: 2px 2px 0 #7a0030;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }

  .result-card {
    background: var(--panel);
    border: 3px solid var(--border);
    padding: 14px 12px;
    cursor: pointer;
    transition: none;
    position: relative;
    overflow: hidden;
  }

  .result-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,159,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .result-card:hover {
    border-color: var(--accent1);
    background: rgba(0,255,159,0.05);
    box-shadow: 4px 4px 0 #006640;
    transform: translate(-2px, -2px);
  }

  .result-card:active {
    transform: translate(0,0);
    box-shadow: none;
  }

  .result-card .base-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent4);
    text-shadow: 2px 2px 0 #664400;
  }

  .result-card .arrow {
    color: var(--dim);
    font-size: 14px;
    margin: 4px 0;
  }

  .result-card .calc-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--accent1);
    text-shadow: 1px 1px 0 #006640;
  }

  .result-card .dims {
    font-size: 16px;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .result-card .px-label {
    font-size: 13px;
    color: var(--dim);
  }

  .result-card .not16 {
    font-size: 13px;
    color: var(--accent2);
    margin-top: 4px;
  }

  /* highlight non-integer */
  .result-card.non-integer {
    border-color: #3a2030;
    opacity: 0.55;
  }
  .result-card.non-integer:hover {
    border-color: var(--accent2);
    opacity: 0.85;
  }

  /* ===== COPY TOAST ===== */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent1);
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 20px;
    border: 3px solid #006640;
    box-shadow: 4px 4px 0 #003320;
    z-index: 200;
    transition: transform 0.15s steps(4);
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ===== PIXEL DECORATIONS ===== */
  .deco-line {
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      var(--accent1) 0px,
      var(--accent1) 8px,
      transparent 8px,
      transparent 16px
    );
    margin: 20px 0;
    opacity: 0.3;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--dim);
    margin-top: 32px;
    padding-top: 12px;
    border-top: 3px solid var(--border);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent1);
    margin-right: 6px;
    animation: blink 2s step-end infinite;
    image-rendering: pixelated;
  }

  /* Frame counter style decoration */
  .frame-count {
    color: var(--accent3);
  }

  /* Warning for non-16-multiple */
  .warn-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--accent2);
    background: rgba(255,0,110,0.1);
    border: 2px solid var(--accent2);
    padding: 3px 6px;
    display: inline-block;
    margin-top: 5px;
  }

  /* pixel corner decorations */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--accent1);
  }
  .corner-tl { top: -4px; left: -4px; }
  .corner-tr { top: -4px; right: -4px; }
  .corner-bl { bottom: -4px; left: -4px; }
  .corner-br { bottom: -4px; right: -4px; }

  .section-wrapper {
    position: relative;
  }

  /* Results info bar */
  .info-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 16px;
    color: var(--dim);
  }
  .info-bar .count {
    color: var(--accent3);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
  }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--dim);
  }

  .filter-btn {
    background: var(--grid);
    border: 2px solid var(--dim);
    color: var(--dim);
    font-family: 'VT323', monospace;
    font-size: 16px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .filter-btn.active {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  /* Large preview */
  .preview-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--grid);
    border: 3px solid var(--border);
    padding: 12px 16px;
    margin-bottom: 16px;
    min-height: 56px;
  }

  .preview-ratio-vis {
    flex-shrink: 0;
    position: relative;
  }

  .preview-ratio-vis canvas {
    display: block;
    image-rendering: pixelated;
  }

  .preview-info {
    font-size: 18px;
    color: var(--text);
    line-height: 1.5;
  }

  .preview-info .pi-ratio {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--accent2);
  }

  .preview-info .pi-hint {
    font-size: 15px;
    color: var(--dim);
    margin-top: 2px;
  }

  .mode-tag {
    font-size: 14px;
    background: rgba(0,180,255,0.12);
    border: 2px solid var(--accent3);
    color: var(--accent3);
    padding: 2px 8px;
    margin-left: 8px;
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="title-block">
      <h1>PIXEL CANVAS<br>CALCULATOR</h1>
      <div class="subtitle">▸ SIZE FINDER v1.0 <span class="blink">█</span></div>
    </div>
  </header>

  <div class="deco-line"></div>

  <!-- CONTROLS -->
  <div class="controls-grid">

    <!-- RATIO PRESETS -->
    <div class="px-box presets-panel section-wrapper">
      <div class="corner-tl"></div><div class="corner-tr"></div>
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="section-label">RATIO PRESETS</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <!-- CUSTOM RATIO -->
    <div class="px-box custom-panel section-wrapper">
      <div class="corner-tl"></div><div class="corner-tr"></div>
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="section-label">CUSTOM RATIO</div>
      <div class="custom-row">
        <input class="px-input" type="number" id="customW" value="1" min="1" max="99">
        <span class="colon-sep">:</span>
        <input class="px-input" type="number" id="customH" value="1" min="1" max="99">
        <button class="apply-btn" id="applyCustom">APPLY</button>
      </div>
    </div>

    <!-- BASE SIDE SELECTOR -->
    <div class="px-box base-panel section-wrapper">
      <div class="corner-tl"></div><div class="corner-tr"></div>
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="section-label">BASE SIDE (16の倍数を当てはめる辺)</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btnWidth" onclick="setBase('width')">WIDTH (横)</button>
        <button class="toggle-btn" id="btnHeight" onclick="setBase('height')">HEIGHT (縦)</button>
        <span class="toggle-desc">→ もう一方の辺を自動計算します</span>
        <span class="mode-tag" id="modeTag">横辺モード</span>
      </div>
    </div>

  </div>

  <!-- PREVIEW BAR -->
  <div class="preview-bar">
    <div class="preview-ratio-vis">
      <canvas id="ratioVis" width="80" height="60"></canvas>
    </div>
    <div class="preview-info">
      <div class="pi-ratio" id="previewRatio">4 : 3</div>
      <div class="pi-hint" id="previewHint">16の倍数(16〜512)を横幅として、高さを計算</div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-section section-wrapper">
    <div class="results-header">
      <div class="info-bar">
        <div class="section-label" style="margin-bottom:0">RESULTS</div>
        <span class="count" id="resultCount">-- entries</span>
      </div>
      <div class="filter-row">
        <span class="filter-label">FILTER:</span>
        <button class="filter-btn active" onclick="setFilter('all')" id="filterAll">ALL</button>
        <button class="filter-btn" onclick="setFilter('valid')" id="filterValid">×16のみ</button>
      </div>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <div class="deco-line"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div><span class="status-dot"></span>SYSTEM READY</div>
    <div class="frame-count" id="frameCount">RATIO: --</div>
    <div>16PX GRID ✓</div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">COPIED!</div>

<script>
// ===== STATE =====
const PRESETS = [
  { label: '4:3',  w: 4, h: 3,  tag: 'LANDSCAPE' },
  { label: '3:2',  w: 3, h: 2,  tag: 'PHOTO' },
  { label: '16:9', w: 16, h: 9, tag: 'WIDESCREEN' },
  { label: '3:4',  w: 3, h: 4,  tag: 'PORTRAIT' },
  { label: '2:3',  w: 2, h: 3,  tag: 'PORTRAIT' },
  { label: '9:16', w: 9, h: 16, tag: 'VERTICAL' },
];

let state = {
  ratioW: 4,
  ratioH: 3,
  base: 'width',   // 'width' | 'height'
  activePreset: 0,
  filter: 'all',
};

// ===== BUILD UI =====
function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (i === state.activePreset ? ' active' : '');
    btn.innerHTML = `<span class="ratio-display">${p.label}</span><span class="ratio-type">${p.tag}</span>`;
    btn.onclick = () => selectPreset(i);
    grid.appendChild(btn);
  });
}

function selectPreset(i) {
  state.activePreset = i;
  state.ratioW = PRESETS[i].w;
  state.ratioH = PRESETS[i].h;
  document.getElementById('customW').value = state.ratioW;
  document.getElementById('customH').value = state.ratioH;
  buildPresets();
  render();
}

function setBase(b) {
  state.base = b;
  document.getElementById('btnWidth').classList.toggle('active', b === 'width');
  document.getElementById('btnHeight').classList.toggle('active', b === 'height');
  document.getElementById('modeTag').textContent = b === 'width' ? '横辺モード' : '縦辺モード';
  render();
}

function setFilter(f) {
  state.filter = f;
  document.getElementById('filterAll').classList.toggle('active', f === 'all');
  document.getElementById('filterValid').classList.toggle('active', f === 'valid');
  render();
}

// ===== CALC =====
function calcSizes() {
  const results = [];
  for (let v = 16; v <= 512; v += 16) {
    let w, h;
    if (state.base === 'width') {
      w = v;
      h = (v / state.ratioW) * state.ratioH;
    } else {
      h = v;
      w = (v / state.ratioH) * state.ratioW;
    }
    const isValid = Number.isInteger(h) && Number.isInteger(w);
    const isMultiple16 = isValid && (Math.round(h) % 16 === 0) && (Math.round(w) % 16 === 0);
    results.push({ base: v, w: Math.round(w * 100) / 100, h: Math.round(h * 100) / 100, isValid, isMultiple16 });
  }
  return results;
}

// ===== RENDER RATIO VIS =====
function renderRatioVis() {
  const canvas = document.getElementById('ratioVis');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 80, 60);

  const rW = state.ratioW;
  const rH = state.ratioH;
  const maxW = 74, maxH = 54;
  let dw, dh;
  if (rW / rH > maxW / maxH) {
    dw = maxW; dh = Math.round(maxW * rH / rW);
  } else {
    dh = maxH; dw = Math.round(maxH * rW / rH);
  }
  const ox = Math.floor((80 - dw) / 2);
  const oy = Math.floor((60 - dh) / 2);

  // outer glow
  ctx.shadowColor = '#00ff9f';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(0,255,159,0.08)';
  ctx.fillRect(ox, oy, dw, dh);
  ctx.shadowBlur = 0;

  // grid lines (pixel style)
  ctx.strokeStyle = 'rgba(0,255,159,0.18)';
  ctx.lineWidth = 1;
  const step = Math.max(4, Math.floor(Math.min(dw, dh) / 6));
  for (let x = ox; x <= ox + dw; x += step) { ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + dh); ctx.stroke(); }
  for (let y = oy; y <= oy + dh; y += step) { ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + dw, y); ctx.stroke(); }

  // border (pixel art style - 2px block border)
  ctx.strokeStyle = '#00ff9f';
  ctx.lineWidth = 3;
  ctx.strokeRect(ox + 1.5, oy + 1.5, dw - 3, dh - 3);

  // diagonal
  ctx.strokeStyle = 'rgba(0,255,159,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + dw, oy + dh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox + dw, oy); ctx.lineTo(ox, oy + dh); ctx.stroke();
}

// ===== RENDER RESULTS =====
function render() {
  const rW = state.ratioW, rH = state.ratioH;
  document.getElementById('previewRatio').textContent = `${rW} : ${rH}`;
  const baseLabel = state.base === 'width' ? '横幅' : '縦幅';
  const calcLabel = state.base === 'width' ? '高さ' : '横幅';
  document.getElementById('previewHint').textContent =
    `16の倍数(16〜512)を${baseLabel}として、${calcLabel}を計算`;
  document.getElementById('frameCount').textContent = `RATIO: ${rW}:${rH}`;
  renderRatioVis();

  const sizes = calcSizes();
  const filtered = state.filter === 'valid' ? sizes.filter(s => s.isMultiple16) : sizes;

  document.getElementById('resultCount').textContent = `${filtered.length} entries`;

  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'result-card' + (!item.isValid ? ' non-integer' : '');

    const baseVal = item.base;
    const calcVal = state.base === 'width' ? item.h : item.w;
    const wVal = state.base === 'width' ? item.w : item.w;
    const hVal = state.base === 'width' ? item.h : item.h;

    const baseLabel = state.base === 'width' ? 'W' : 'H';
    const calcLabel = state.base === 'width' ? 'H' : 'W';

    const isCalcInt = Number.isInteger(calcVal);
    const isCalcMul16 = isCalcInt && (Math.round(calcVal) % 16 === 0);

    let warnHtml = '';
    if (!isCalcInt) {
      warnHtml = `<div class="warn-badge">⚠ 非整数</div>`;
    } else if (!isCalcMul16) {
      warnHtml = `<div class="warn-badge">▲ ×16外</div>`;
    }

    card.innerHTML = `
      <div class="base-val">${baseLabel}: ${baseVal}</div>
      <div class="arrow">↓</div>
      <div class="calc-val">${calcLabel}: ${isCalcInt ? Math.round(calcVal) : calcVal.toFixed(2)}</div>
      <div class="dims">${Math.round(wVal * 100) / 100} × ${Math.round(hVal * 100) / 100}</div>
      <div class="px-label">px</div>
      ${warnHtml}
    `;

    if (item.isValid) {
      card.title = `クリックでコピー: ${Math.round(wVal)} × ${Math.round(hVal)}`;
      card.onclick = () => copySize(Math.round(wVal), Math.round(hVal));
    }

    grid.appendChild(card);
  });
}

// ===== COPY =====
let toastTimeout;
function copySize(w, h) {
  const text = `${w} × ${h}`;
  navigator.clipboard.writeText(text).catch(() => {});
  const toast = document.getElementById('toast');
  toast.textContent = `COPIED: ${text}`;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ===== EVENTS =====
document.getElementById('applyCustom').onclick = () => {
  const w = parseInt(document.getElementById('customW').value) || 1;
  const h = parseInt(document.getElementById('customH').value) || 1;
  state.ratioW = Math.max(1, Math.min(99, w));
  state.ratioH = Math.max(1, Math.min(99, h));
  state.activePreset = -1;
  buildPresets();
  render();
};

['customW', 'customH'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('applyCustom').click();
  });
});

// ===== INIT =====
buildPresets();
render();
</script>
</body>
</html>
